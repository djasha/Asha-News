name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run release candidate gate
        run: npm run release:check
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_SMOKE_TOKEN }}
          REQUIRE_AUTH_SMOKE: "false"

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secret readiness
        id: deploy_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "$VPS_HOST" && -n "$VPS_USER" && -n "$VPS_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping VPS deploy because one or more required secrets are missing."
          fi

      - name: Deploy via SSH
        if: ${{ steps.deploy_secrets.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR || '/opt/asha-news' }}
            git pull origin main
            cd server && npm ci --production
            cd .. && npm ci && npm run build
            pm2 restart asha-server || pm2 start server/server.js --name asha-server
            echo "Deploy complete at $(date)"
