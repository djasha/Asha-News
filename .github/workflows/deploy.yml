name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      AUTH_TOKEN: ${{ secrets.AUTH_SMOKE_TOKEN }}
      REQUIRE_AUTH_SMOKE: ${{ secrets.AUTH_SMOKE_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run release candidate gate
        run: npm run release:check

  deploy-skipped:
    needs: lint-and-test
    if: ${{ needs.lint-and-test.result == 'success' && (secrets.VPS_HOST == '' || secrets.VPS_USER == '' || secrets.VPS_SSH_KEY == '') }}
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped deploy
        run: |
          echo "Skipping VPS deploy because one or more required secrets are missing."
          echo "Required secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY"

  deploy:
    needs: lint-and-test
    if: ${{ needs.lint-and-test.result == 'success' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR || '/opt/asha-news' }}
            git pull origin main
            cd server && npm ci --production
            cd .. && npm ci && npm run build
            pm2 restart asha-server || pm2 start server/server.js --name asha-server
            echo "Deploy complete at $(date)"
